<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Typedom Control Panel</title>
<style>
body { font-family: Arial; padding: 20px; background: #f0f0f0; }
h2 { color: #333; text-align:center; }
input, button { padding: 10px; margin: 5px 0; width: 100%; box-sizing: border-box; }
button { background: #007bff; color: white; border: none; cursor: pointer; }
button:hover { background: #0056b3; }
#result { margin-top: 10px; text-align:center; }
.container { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
</style>
</head>
<body>
<div class="container">
<h2>Typedom Panel</h2>
<form id="domainForm">
  <input type="text" id="name" placeholder="Domain name (example: varun)" required>
  <input type="url" id="target" placeholder="Target URL (example: https://google.com)" required>
  <button type="submit">Create Domain</button>
</form>
<div id="result"></div>
</div>

<script>
document.getElementById("domainForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const name = document.getElementById("name").value.trim();
  const target = document.getElementById("target").value.trim();
  if(!name || !target){ alert("Both fields required"); return; }

  try {
    const res = await fetch("/create", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, target })
    });
    const data = await res.json();
    document.getElementById("result").innerHTML = data.success 
      ? `✅ Domain created! Access: <a href="/${name}" target="_blank">/${name}</a>` 
      : `❌ Error: ${data.error || 'Unknown'}`;
  } catch(err) {
    document.getElementById("result").innerText = "❌ Error: " + err;
  }
});
</script>
</body>
</html>
